name: Autograde
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  grade:
    if: >
      github.repository != 'agiacalone/cecs-378-lab-symmetric-crypto-dev' &&
      github.repository != 'agiacalone/cecs-378-lab-symmetric-crypto'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}
      SPELLBREAKER_ORACLE: ${{ secrets.SPELLBREAKER_ORACLE_URL }}
      SPELLBREAKER_ORACLE_TOKEN: ${{ secrets.SPELLBREAKER_ORACLE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - { name: Ward I,   id: ward1, continue-on-error: true, run: python tests/grade.py ward1 }
      - { name: Ward II,  id: ward2, continue-on-error: true, run: python tests/grade.py ward2 }
      - { name: Ward III, id: ward3, continue-on-error: true, run: python tests/grade.py ward3 }
      - { name: OMEGA,    id: ward4, continue-on-error: true, run: python tests/grade.py ward4 }
      - name: Summary + honor gate
        if: always()
        run: |
          {
            echo "## Autograde — Spellbreaker"
            echo "| Ward | Result |"; echo "| --- | --- |"
            echo "| I    | ${{ steps.ward1.outcome }} |"
            echo "| II   | ${{ steps.ward2.outcome }} |"
            echo "| III  | ${{ steps.ward3.outcome }} |"
            echo "| IV   | ${{ steps.ward4.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.ward1.outcome }}" != "success" && "${{ steps.ward2.outcome }}" != "success" \
             && "${{ steps.ward3.outcome }}" != "success" && "${{ steps.ward4.outcome }}" != "success" ]]; then
            echo "::error::No wards passed (check exploits + honor flag)."; exit 1
          fi
